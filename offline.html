<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Ajay Shingadiya</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>

<body>
    <header class="header">
        <nav class="nav-container">
            <div class="logo">
                <a href="/">Ajay Shingadiya</a>
            </div>
        </nav>
    </header>

    <main class="error-page">
        <div class="container">
            <div class="error-content">
                <h1 class="error-code">📡</h1>
                <h2 class="error-title">You're Offline</h2>
                <p class="error-message">It looks like you've lost your internet connection. Please check your network
                    and try again.</p>
                <button onclick="window.location.reload()" class="btn btn-primary">Try Again</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Ajay Shingadiya. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>

</html>
